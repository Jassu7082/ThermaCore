name: thermacore
description: Real-time mobile temperature monitoring — no trackers, no internet.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local Database ────────────────────────────────────────
  drift: 2.18.0
  sqlite3_flutter_libs: 0.5.24
  path: ^1.9.0

  # ── Preferences ───────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Charts ────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Background / Foreground Service ──────────────────────
  flutter_foreground_task: ^8.10.0

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Home Screen Widget ────────────────────────────────────
  home_widget: ^0.5.0

  # ── File Export ───────────────────────────────────────────
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  permission_handler: ^11.3.1

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: 2.4.0
  drift_dev: 2.18.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-ExtraBold.ttf
          weight: 800
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
